prompts:
  - smoke
  - flame
  - fire
  - smoke plume

sampling:
  frame_stride: 10

thresholds:
  detection_confidence: 0.35
  high_risk_confidence: 0.65
  min_mask_area_ratio: 0.005
  high_growth_ratio: 0.20

visualization:
  box_thickness: 2
  mask_alpha: 0.35

models:
  device: null # null -> auto select (cuda if available else cpu)
  detector:
    type: "yolo" # "yolo" or "groundingdino"
  yolo:
    model_name: "yolov8n" # "yolov8n" or "yolov8m"
    backend: "mock" # "mock" or "ultralytics"
    conf_threshold: 0.35
  grounding_dino:
    config: "TODO: set GroundingDINO python config path"
    checkpoint: "TODO: set GroundingDINO checkpoint (.pth) path"
    box_threshold: 0.35
    text_threshold: 0.25
  sam2:
    model_config: "TODO: set SAM2 model config (.yaml) path"
    checkpoint: "TODO: set SAM2 checkpoint (.pt) path"
  vlm:
    enabled: true
    backend: "placeholder" # "placeholder" or "huggingface"
    model_name_or_path: "Qwen/Qwen2-VL-2B-Instruct"
    device: "cuda"
    torch_dtype: "float16"
    load_in_4bit: false
    max_new_tokens: 64
    only_on_risk_levels:
      - "MEDIUM"
      - "HIGH"
    selected_frame_interval: 3
